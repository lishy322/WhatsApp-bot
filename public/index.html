<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול תורים</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
}

header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:15px;
}

.controls{
margin-bottom:10px;
}

.calendar{
display:grid;
grid-template-columns:60px repeat(5,1fr);
height:80vh;
border:1px solid #ddd;
background:white;
}

.hour{
border-bottom:1px solid #eee;
font-size:12px;
padding:2px;
}

.day{
border-left:1px solid #eee;
position:relative;
}

.event{
position:absolute;
left:5px;
right:5px;
border-radius:6px;
color:white;
padding:4px;
font-size:12px;
cursor:grab;
}

.man{background:#3b82f6;}
.woman{background:#ec4899;}
.kid{background:#10b981;}

.closed{
background:#eee;
height:100%;
position:absolute;
top:0;
left:0;
right:0;
opacity:0.6;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<div>📅 ניהול תורים</div>

<div>
<select id="worker" onchange="load()">
<option value="דוד">דוד</option>
<option value="משה">משה</option>
</select>

<button onclick="closeDay()">סגור יום</button>
</div>
</header>

<div class="container">

<div class="calendar" id="calendar"></div>

</div>

<script>

function getWeek(){
  const today=new Date();
  const days=[];
  for(let i=0;i<5;i++){
    const d=new Date();
    d.setDate(today.getDate()-today.getDay()+i);
    days.push(d);
  }
  return days;
}

function timeToY(time){
  const [h,m]=time.split(":").map(Number);
  return ((h-8)*60 + m) * 1.2;
}

function durationToHeight(d){
  return d * 1.2;
}

async function load(){

const worker=document.getElementById("worker").value;
const res=await fetch("/appointments/week");
const data=await res.json();

const cal=document.getElementById("calendar");
cal.innerHTML="";

const days=getWeek();

// שעות צד
for(let h=8;h<=18;h++){
  cal.innerHTML+=`<div class="hour">${h}:00</div>`;
  days.forEach(()=>cal.innerHTML+=`<div class="day"></div>`);
}

// יצירת בלוקים
days.forEach((day,dayIndex)=>{

  const dateStr=day.toISOString().split("T")[0];

  const dayEvents=data.filter(a =>
    a.worker===worker && a.date===dateStr
  );

  const dayDivs = document.querySelectorAll(".day");

  const col = dayIndex+1;

  dayEvents.forEach(a=>{

    const index = col + (Math.floor((parseInt(a.time.split(":")[0])-8))*6);

    const el = dayDivs[index];

    const div=document.createElement("div");

    const cls =
      a.type==="גבר"?"man":
      a.type==="אישה"?"woman":"kid";

    div.className="event "+cls;
    div.style.top = timeToY(a.time)+"px";
    div.style.height = durationToHeight(a.duration)+"px";

    div.innerText = a.type;

    div.draggable=true;

    div.ondragstart=()=>window.dragId=a.id;

    div.onclick=async ()=>{
      if(confirm("לבטל תור?")){
        await fetch("/appointments/"+a.id,{method:"DELETE"});
        load();
      }
    };

    el.appendChild(div);

  });

});

}

// גרירה
document.addEventListener("dragover",e=>e.preventDefault());

document.addEventListener("drop",async e=>{
  if(!window.dragId) return;

  const date=prompt("תאריך חדש YYYY-MM-DD");
  const time=prompt("שעה חדשה HH:MM");

  await fetch("/appointments/"+window.dragId,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({date,time})
  });

  load();
});

// סגירת יום
async function closeDay(){
  const date=prompt("תאריך YYYY-MM-DD");
  if(!date) return;

  await fetch("/close-day",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({date})
  });

  alert("יום נסגר");
}

load();

</script>

</body>
</html>
