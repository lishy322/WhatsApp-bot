<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>יומן שבועי אמיתי</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px }
.grid { display:grid; grid-template-columns:80px repeat(5,1fr); gap:5px }
.cell { background:white; padding:8px; border-radius:6px; text-align:center; cursor:pointer; font-size:12px }
.header { font-weight:bold; background:#ddd }
.booked { color:white }
.male { background:#3498db }
.female { background:#e84393 }
.child { background:#00b894 }
.empty { color:#aaa }
</style>
</head>

<body>

<h1>📅 יומן שבועי</h1>

<select id="worker">
  <option value="david">דוד</option>
  <option value="moshe">משה</option>
</select>

<button onclick="load()">טען</button>

<div id="calendar" class="grid"></div>

<script>

const days = ["ראשון","שני","שלישי","רביעי","חמישי"];

const slots = [
  "08:00","08:15","08:30","08:45",
  "09:00","09:15","09:30","09:45",
  "10:00","10:15","10:30","10:45",
  "16:00","16:15","16:30","16:45",
  "17:00","17:15","17:30","17:45",
  "18:00","18:15"
];

let weekDates = [];
let appointments = [];

// ===== יצירת שבוע =====
function generateWeek() {
  const today = new Date();
  const start = new Date(today);

  start.setDate(today.getDate() - today.getDay());

  weekDates = [];

  for (let i = 0; i < 5; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);

    weekDates.push(d.toISOString().split("T")[0]);
  }
}

// ===== טעינה =====
async function load() {

  generateWeek();

  const res = await fetch("/appointments/week");
  appointments = await res.json();

  render();
}

// ===== ציור =====
function render() {

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  // header
  cal.innerHTML += `<div class="header"></div>`;

  weekDates.forEach((date, i) => {
    cal.innerHTML += `<div class="header">${days[i]}<br>${date}</div>`;
  });

  const worker = document.getElementById("worker").value;

  slots.forEach(time => {

    cal.innerHTML += `<div class="header">${time}</div>`;

    weekDates.forEach(date => {

      const booking = appointments.find(a =>
        a.date === date &&
        a.time === time &&
        a.worker === worker
      );

      if (booking) {
        cal.innerHTML += `
          <div class="cell booked ${booking.type}"
            onclick="cancel('${date}','${time}','${worker}')"
            draggable="true"
            ondragstart="drag(event,'${date}','${time}')"
            ondrop="drop(event,'${date}','${time}')"
            ondragover="allowDrop(event)">
            ${translateType(booking.type)}
          </div>
        `;
      } else {
        cal.innerHTML += `
          <div class="cell empty"
            onclick="create('${date}','${time}')"
            ondrop="drop(event,'${date}','${time}')"
            ondragover="allowDrop(event)">
            פנוי
          </div>
        `;
      }
    });
  });
}

// ===== יצירה =====
async function create(date, time) {
  const worker = document.getElementById("worker").value;

  await fetch("/appointments", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      date, time, worker,
      type:"male",
      user:"manual"
    })
  });

  load();
}

// ===== ביטול =====
async function cancel(date, time, worker) {
  if (!confirm("לבטל תור?")) return;

  await fetch("/appointments", {
    method:"DELETE",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ date,time,worker })
  });

  load();
}

// ===== DRAG =====
let dragData = {};

function drag(ev, date, time) {
  dragData = { date, time };
}

function allowDrop(ev) {
  ev.preventDefault();
}

async function drop(ev, newDate, newTime) {
  ev.preventDefault();

  const worker = document.getElementById("worker").value;

  await fetch("/appointments", {
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      oldDate: dragData.date,
      oldTime: dragData.time,
      newDate,
      newTime,
      worker
    })
  });

  load();
}

// ===== תרגום =====
function translateType(type) {
  if (type === "male") return "גבר";
  if (type === "female") return "אישה";
  if (type === "child") return "ילד";
  return "";
}

load();

</script>

</body>
</html>
