<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>יומן תורים</title>

<style>
body {
  margin:0;
  font-family:Arial;
  direction:rtl;
  background:#f1f5f9;
}

.header {
  background:#0f172a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.controls button {
  margin-left:5px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

.calendar {
  display:grid;
  grid-template-columns: 80px repeat(5,1fr);
}

.time {
  border-bottom:1px solid #ddd;
  padding:8px;
  font-size:12px;
  background:#f8fafc;
}

.day-header {
  text-align:center;
  padding:10px;
  font-weight:bold;
  background:#e2e8f0;
  border-bottom:1px solid #ccc;
}

.cell {
  border:1px solid #eee;
  height:60px;
  position:relative;
}

.event {
  position:absolute;
  top:5px;
  left:5px;
  right:5px;
  padding:5px;
  border-radius:6px;
  color:white;
  font-size:12px;
  cursor:grab;
}

.gavar { background:#3b82f6; }
.isha { background:#ec4899; }
.yeled { background:#10b981; }

</style>
</head>

<body>

<div class="header">
  <div>📅 יומן שבועי</div>
  <div class="controls">
    <button onclick="prevWeek()">⬅️</button>
    <button onclick="nextWeek()">➡️</button>
  </div>
</div>

<div id="calendar" class="calendar"></div>

<script>

let current = new Date();
let appointments = [];

function getWeek(){
  const start = new Date(current);
  start.setDate(start.getDate() - start.getDay());

  let days=[];
  for(let i=0;i<5;i++){
    let d=new Date(start);
    d.setDate(start.getDate()+i);
    days.push(d);
  }
  return days;
}

function render(){

  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const week=getWeek();

  cal.innerHTML += "<div></div>";
  week.forEach(d=>{
    cal.innerHTML += `<div class="day-header">${d.toLocaleDateString("he-IL")}</div>`;
  });

  for(let h=8;h<=18;h++){

    cal.innerHTML += `<div class="time">${h}:00</div>`;

    week.forEach(day=>{

      const dateStr=day.toISOString().split("T")[0];
      const time=`${h}:00`;

      const cell=document.createElement("div");
      cell.className="cell";
      cell.dataset.date=dateStr;
      cell.dataset.time=time;

      const found=appointments.find(a=>a.date===dateStr && a.time===time);

      if(found){
        const ev=document.createElement("div");
        ev.className="event";
        ev.draggable=true;

        if(found.type==="גבר") ev.classList.add("gavar");
        if(found.type==="אישה") ev.classList.add("isha");
        if(found.type==="ילד") ev.classList.add("yeled");

        ev.innerText = `${found.time}\n${found.name || found.type}\n(${found.worker})`;

        ev.dataset.id=found.id;

        ev.addEventListener("dragstart",dragStart);

        cell.appendChild(ev);
      }

      cell.addEventListener("dragover",e=>e.preventDefault());
      cell.addEventListener("drop",drop);

      cal.appendChild(cell);
    });
  }
}

let dragged=null;

function dragStart(e){
  dragged=e.target;
}

async function drop(e){

  if(!dragged) return;

  const newDate = e.currentTarget.dataset.date;
  const newTime = e.currentTarget.dataset.time;
  const id = dragged.dataset.id;

  await fetch("/appointments/move",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,newDate,newTime})
  });

  load();
}

function prevWeek(){
  current.setDate(current.getDate()-7);
  render();
}

function nextWeek(){
  current.setDate(current.getDate()+7);
  render();
}

async function load(){
  const res = await fetch("/appointments/week");
  appointments = await res.json();
  render();
}

load();

</script>

</body>
</html>
