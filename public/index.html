<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול תורים</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

header {
  background: #0f172a;
  color: white;
  padding: 15px;
  font-size: 22px;
}

.grid {
  display: grid;
  grid-template-columns: 80px repeat(5, 1fr);
  gap: 5px;
  padding: 20px;
}

.cell {
  background: white;
  padding: 10px;
  border-radius: 6px;
  text-align: center;
  font-size: 12px;
}

.time {
  font-weight: bold;
}

.booked {
  color: white;
}

.man { background: #3b82f6; }
.woman { background: #ec4899; }
.kid { background: #10b981; }

</style>
</head>

<body>

<header>📅 מערכת ניהול תורים</header>

<div id="grid" class="grid"></div>

<script>

const days = ["ראשון","שני","שלישי","רביעי","חמישי"];

function generateTimes() {
  const times = [];
  for (let h=8; h<=18; h++) {
    for (let m=0; m<60; m+=15) {
      if (h===18 && m>0) continue;
      times.push(
        String(h).padStart(2,"0")+":"+
        String(m).padStart(2,"0")
      );
    }
  }
  return times;
}

async function load() {
  const res = await fetch("/appointments/week");
  const data = await res.json();

  const grid = document.getElementById("grid");
  const times = generateTimes();

  grid.innerHTML = "";

  grid.innerHTML += "<div></div>";
  days.forEach(d => grid.innerHTML += `<div>${d}</div>`);

  times.forEach(time => {
    grid.innerHTML += `<div class="cell time">${time}</div>`;

    for (let i=0;i<5;i++) {
      const match = data.find(a => a.time === time);

      if (match) {
        let cls = match.type === "גבר" ? "man" :
                  match.type === "אישה" ? "woman" : "kid";

        grid.innerHTML += `<div class="cell booked ${cls}">${match.type}</div>`;
      } else {
        grid.innerHTML += `<div class="cell">פנוי</div>`;
      }
    }
  });
}

load();

</script>

</body>
</html>
