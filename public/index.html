<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>מערכת תורים</title>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9;direction:rtl;}

.header{
background:#0f172a;color:#fff;padding:15px;
display:flex;justify-content:space-between;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;padding:10px;
}

.day{
background:#fff;border-radius:10px;padding:6px;
min-height:110px;cursor:pointer;
}

.event{
font-size:11px;padding:4px;border-radius:6px;margin-top:3px;color:#fff;
cursor:grab;
}

.man{background:#3b82f6;}
.woman{background:#ec4899;}
.kid{background:#10b981;}
.bot{border:2px dashed yellow;}
.manual{border:2px solid black;}

.modal{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.6);
display:none;justify-content:center;align-items:center;
}

.modal-box{
background:#fff;padding:20px;border-radius:10px;width:320px;
}

input,select{
width:100%;margin-bottom:8px;padding:6px;
}

button{
padding:6px;border:none;border-radius:6px;background:#3b82f6;color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>✂️ העסק שלי - ליבי 🤖</div>
  <div id="monthTitle"></div>
</div>

<div id="calendar" class="calendar"></div>

<!-- DAY VIEW -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3 id="dayTitle"></h3>
    <div id="slots"></div>
    <button onclick="openForm()">➕ תור</button>
  </div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="modal-box">
    <h3>תור חדש</h3>

    <input id="name" placeholder="שם לקוח">
    
    <select id="worker">
      <option>דוד</option>
      <option>משה</option>
    </select>

    <select id="type">
      <option>גבר</option>
      <option>אישה</option>
      <option>ילד</option>
    </select>

    <input id="date">
    <input id="time">

    <button onclick="save()">שמור</button>
  </div>
</div>

<script>

let data=[];
let selectedDate="";
let dragId=null;

async function load(){
  const res=await fetch("/appointments/week");
  data=await res.json();
  render();
}

function getDays(){
  let now=new Date();
  let arr=[];
  for(let i=0;i<30;i++){
    let d=new Date();
    d.setDate(now.getDate()+i);
    arr.push(d);
  }
  return arr;
}

function render(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  getDays().forEach(d=>{
    const date=d.toISOString().split("T")[0];

    const div=document.createElement("div");
    div.className="day";
    div.innerHTML=`<b>${d.getDate()}</b>`;

    const daily=data.filter(a=>a.date===date);

    daily.forEach(a=>{
      const el=document.createElement("div");
      el.className="event";

      if(a.type==="גבר") el.classList.add("man");
      if(a.type==="אישה") el.classList.add("woman");
      if(a.type==="ילד") el.classList.add("kid");

      if(a.source==="manual") el.classList.add("manual");
      else el.classList.add("bot");

      el.innerText=`${a.time} ${a.name}`;

      el.draggable=true;
      el.dataset.id=a.id;

      el.ondragstart=()=>dragId=a.id;

      el.onclick=(e)=>{
        e.stopPropagation();
        if(confirm("לבטל תור?")){
          fetch("/appointments/"+a.id,{method:"DELETE"}).then(load);
        }
      };

      div.appendChild(el);
    });

    div.ondragover=e=>e.preventDefault();

    div.ondrop=()=>{
      if(!dragId) return;
      fetch("/appointments/move",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id:dragId,newDate:date,newTime:"10:00"})
      }).then(load);
    };

    div.onclick=()=>openDay(date);

    cal.appendChild(div);
  });
}

function openDay(date){
  selectedDate=date;
  document.getElementById("modal").style.display="flex";
  document.getElementById("dayTitle").innerText=date;

  const slots=document.getElementById("slots");
  slots.innerHTML="";

  for(let h=8;h<=18;h++){
    let time=(h<10?"0":"")+h+":00";

    let found=data.find(a=>a.date===date && a.time===time);

    let div=document.createElement("div");

    if(found){
      div.innerText=time+" "+found.name;
    }else{
      div.innerText=time+" פנוי";
    }

    slots.appendChild(div);
  }
}

function openForm(){
  document.getElementById("formModal").style.display="flex";
  document.getElementById("date").value=selectedDate;
}

function save(){

  fetch("/appointments/manual",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:document.getElementById("name").value,
      worker:document.getElementById("worker").value,
      type:document.getElementById("type").value,
      date:document.getElementById("date").value,
      time:document.getElementById("time").value,
      source:"manual"
    })
  }).then(()=>{
    document.getElementById("formModal").style.display="none";
    load();
  });
}

load();

</script>

</body>
</html>
