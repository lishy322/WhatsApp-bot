<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>ניהול תורים</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fb;
  direction: rtl;
}

.header {
  background: #0f172a;
  color: white;
  padding: 15px;
  font-size: 20px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 20px;
}

.week {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

.day {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.day h3 {
  margin: 0;
  font-size: 16px;
  border-bottom: 1px solid #eee;
  padding-bottom: 5px;
}

.slot {
  margin-top: 5px;
  padding: 6px;
  border-radius: 6px;
  background: #e5e7eb;
  font-size: 12px;
}

.busy {
  background: #ec4899;
  color: white;
}

.gavar { background:#3b82f6; color:white; }
.isha { background:#ec4899; color:white; }
.yeled { background:#10b981; color:white; }

</style>
</head>

<body>

<div class="header">
  <div>📅 מערכת ניהול תורים</div>
  <div>דוד / משה</div>
</div>

<div class="container">
  <div id="calendar" class="week"></div>
</div>

<script>

const calendar = document.getElementById("calendar");

function getWeekDates(){
  const dates = [];
  const today = new Date();

  for(let i=0;i<5;i++){
    const d = new Date();
    d.setDate(today.getDate() + i);
    dates.push(d);
  }

  return dates;
}

function formatDate(d){
  return d.toISOString().split("T")[0];
}

function render(appointments){

  calendar.innerHTML = "";

  const days = getWeekDates();

  days.forEach(day => {

    const dateStr = formatDate(day);

    const div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <h3>${day.toLocaleDateString("he-IL",{weekday:"long"})}<br>${dateStr}</h3>
    `;

    for(let h=8; h<=18; h++){
      let time = (h<10?"0":"")+h+":00";

      const appt = appointments.find(a =>
        a.date === dateStr && a.time === time
      );

      const slot = document.createElement("div");
      slot.className = "slot";

      if(appt){
        slot.classList.add("busy");

        if(appt.type==="גבר") slot.classList.add("gavar");
        if(appt.type==="אישה") slot.classList.add("isha");
        if(appt.type==="ילד") slot.classList.add("yeled");

        slot.innerText = `${time} - ${appt.type} (${appt.worker})`;
      } else {
        slot.innerText = time + " פנוי";
      }

      div.appendChild(slot);
    }

    calendar.appendChild(div);
  });
}

async function load(){
  try{
    const res = await fetch("/appointments/week");
    const data = await res.json();
    render(data);
  }catch(e){
    console.error("ERROR:", e);
  }
}

load();

</script>

</body>
</html>
