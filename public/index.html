<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>יומן תורים מתקדם</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  padding: 20px;
}

h1 {
  text-align: center;
}

.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

select, button {
  padding: 8px;
}

.grid {
  display: grid;
  grid-template-columns: 80px repeat(5, 1fr);
  gap: 5px;
}

.cell {
  background: white;
  padding: 8px;
  border-radius: 6px;
  text-align: center;
  cursor: pointer;
  font-size: 12px;
}

.header {
  font-weight: bold;
  background: #ddd;
}

.booked {
  background: #e74c3c;
  color: white;
}

.male { background:#3498db; }
.female { background:#e84393; }
.child { background:#00b894; }

.empty {
  color: #aaa;
}
</style>
</head>

<body>

<h1>📅 יומן שבועי</h1>

<div class="controls">
  <select id="worker">
    <option value="david">דוד</option>
    <option value="moshe">משה</option>
  </select>

  <button onclick="load()">טען</button>
</div>

<div id="calendar" class="grid"></div>

<script>

const days = ["ראשון","שני","שלישי","רביעי","חמישי"];

const slots = [
  "08:00","08:15","08:30","08:45",
  "09:00","09:15","09:30","09:45",
  "10:00","10:15","10:30","10:45",
  "16:00","16:15","16:30","16:45",
  "17:00","17:15","17:30","17:45",
  "18:00","18:15"
];

let appointments = [];

// ===== טעינה =====
async function load() {
  const res = await fetch("/appointments?date=2026-04-12");
  appointments = await res.json();
  render();
}

// ===== ציור =====
function render() {

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  // header
  cal.innerHTML += `<div class="header"></div>`;
  days.forEach(d => {
    cal.innerHTML += `<div class="header">${d}</div>`;
  });

  const worker = document.getElementById("worker").value;

  slots.forEach(time => {

    cal.innerHTML += `<div class="header">${time}</div>`;

    for (let i = 0; i < 5; i++) {

      const booking = appointments.find(a =>
        a.time === time && a.worker === worker
      );

      if (booking) {
        cal.innerHTML += `
          <div class="cell booked ${booking.type}"
            onclick="cancel('${booking.date}','${booking.time}','${booking.worker}')"
            draggable="true"
            ondragstart="drag(event,'${booking.time}')"
            ondrop="drop(event,'${time}')"
            ondragover="allowDrop(event)"
          >
            ${translateType(booking.type)}
          </div>
        `;
      } else {
        cal.innerHTML += `
          <div class="cell empty"
            onclick="create('${time}')"
            ondrop="drop(event,'${time}')"
            ondragover="allowDrop(event)"
          >
            פנוי
          </div>
        `;
      }
    }
  });
}

// ===== יצירת תור =====
async function create(time) {

  const worker = document.getElementById("worker").value;

  await fetch("/appointments", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      date: "2026-04-12",
      time,
      worker,
      type: "male",
      user: "manual"
    })
  });

  load();
}

// ===== ביטול =====
async function cancel(date, time, worker) {

  if (!confirm("לבטל תור?")) return;

  await fetch("/appointments", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ date, time, worker })
  });

  load();
}

// ===== DRAG =====
let draggedTime = null;

function drag(ev, time) {
  draggedTime = time;
}

function allowDrop(ev) {
  ev.preventDefault();
}

async function drop(ev, newTime) {
  ev.preventDefault();

  const worker = document.getElementById("worker").value;

  await fetch("/appointments", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      oldDate: "2026-04-12",
      oldTime: draggedTime,
      newDate: "2026-04-12",
      newTime,
      worker
    })
  });

  load();
}

// ===== תרגום =====
function translateType(type) {
  if (type === "male") return "גבר";
  if (type === "female") return "אישה";
  if (type === "child") return "ילד";
  return "";
}

load();

</script>

</body>
</html>
